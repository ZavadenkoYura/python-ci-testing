name: Python CI

on: [push, pull_request]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: pytest --junitxml=results.xml
        continue-on-error: true   # so a failing test still gets reported
     
      - name: Report results to flaky-test-tracker
        if: always()
        run: |
          curl -sf -X POST "$TRACKER_URL/api/v1/test_results" -H "Authorization: Token $AUTH_TOKEN" \ 
            -F "repo=${{ github.repository }}" \
            -F "commit_sha=${{ github.sha }}" \
            -F "branch=${{ github.ref_name }}" \
            -F "ci_run_id=${{ github.run_id }}" \
            -F "results=@results.xml;type=text/xml"
        env:
          TRACKER_URL: ${{ secrets.FLAKY_TRACKER_URL }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
   
      - name: Fail job if tests failed
        if: failure()
        run: exit 1
